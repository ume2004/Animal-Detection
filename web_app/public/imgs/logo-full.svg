<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" width="280" height="56">
  <defs>
    <linearGradient id="pawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#950740;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C3073F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a0a14;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon background circle -->
  <circle cx="28" cy="28" r="26" fill="url(#bgGrad)" stroke="#C3073F" stroke-width="1.8"/>

  <!-- Paw: toe pads -->
  <ellipse cx="16" cy="22" rx="4.5" ry="5.5" fill="url(#pawGrad)"/>
  <ellipse cx="24" cy="17" rx="4.5" ry="5.5" fill="url(#pawGrad)"/>
  <ellipse cx="32" cy="17" rx="4.5" ry="5.5" fill="url(#pawGrad)"/>
  <ellipse cx="40" cy="22" rx="4.5" ry="5.5" fill="url(#pawGrad)"/>

  <!-- Paw: main pad -->
  <ellipse cx="28" cy="33" rx="9" ry="7.5" fill="url(#pawGrad)"/>

  <!-- Text: ANIMAL -->
  <text
    x="64"
    y="24"
    font-family="'Oswald', 'Arial Narrow', Arial, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="3"
    fill="#ffffff"
    text-anchor="start"
  >ANIMAL</text>

  <!-- Text: DETECTION -->
  <text
    x="64"
    y="44"
    font-family="'Oswald', 'Arial Narrow', Arial, sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="5"
    fill="#C3073F"
    text-anchor="start"
  >DETECTION</text>

  <!-- Accent line between words -->
  <rect x="64" y="28" width="180" height="1.5" fill="#C3073F" opacity="0.3" rx="1"/>
</svg>
